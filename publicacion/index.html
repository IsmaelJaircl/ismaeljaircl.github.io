<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JW Extras — Publicación</title>
    <meta name="description" content="Abre esta publicación directamente en JW Extras">
    <meta property="og:title" content="JW Extras — Publicación">
    <meta property="og:description" content="Abre esta publicación directamente en la app JW Extras">
    <meta property="og:type" content="website">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1035 40%, #0d1b2a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        /* ─── Fondo animado mejorado ─── */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.25;
            z-index: 0;
        }
        body::before {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #7c3aed, transparent);
            top: -100px; right: -80px;
            animation: floatOrb1 12s ease-in-out infinite;
        }
        body::after {
            width: 250px; height: 250px;
            background: radial-gradient(circle, #2563eb, transparent);
            bottom: -80px; left: -60px;
            animation: floatOrb2 14s ease-in-out infinite;
        }

        @keyframes floatOrb1 {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-30px, -40px) scale(1.05); }
            50% { transform: translate(0, -60px) scale(1.1); }
            75% { transform: translate(30px, -40px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes floatOrb2 {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, 40px) scale(1.05); }
            50% { transform: translate(0, 60px) scale(1.1); }
            75% { transform: translate(-30px, 40px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* ─── Tarjeta con efecto glassmorphism mejorado ─── */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 28px;
            padding: 48px 32px 40px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 32px 64px rgba(0,0,0,0.4),
                inset 0 1px 0 rgba(255,255,255,0.08);
            animation: cardEntrance 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: translateY(50px) scale(0.9);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }

        /* ─── Icono de app mejorado ─── */
        .app-icon {
            width: 88px; height: 88px;
            border-radius: 22px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #6b21a8 0%, #4c1d95 50%, #7c3aed 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 12px 32px rgba(107,33,168,0.4);
            font-size: 40px;
            animation: iconFloat 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite;
            position: relative;
            overflow: hidden;
        }

        .app-icon::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.2), transparent);
            border-radius: 22px;
            opacity: 0;
            animation: shine 3s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-12px) scale(1.02); }
        }

        @keyframes shine {
            0%, 100% { opacity: 0; }
            50% { opacity: 0.3; }
        }

        .app-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 24px;
            animation: fadeInUp 0.6s ease 0.2s both;
        }

        .pub-name {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.3;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInUp 0.6s ease 0.3s both;
        }

        .pub-detail {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            font-weight: 500;
            margin-bottom: 32px;
            animation: fadeInUp 0.6s ease 0.4s both;
        }

        /* ─── Estado con spinner mejorado ─── */
        .status {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 28px;
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            font-weight: 500;
            min-height: 24px;
            animation: fadeInUp 0.6s ease 0.5s both;
        }

        .spinner {
            width: 18px;
            height: 18px;
            position: relative;
            display: inline-block;
        }

        .spinner::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            animation: spinnerRotate 2s linear infinite;
        }

        .spinner::after {
            content: '';
            position: absolute;
            inset: 4px;
            border: 2px solid transparent;
            border-top-color: #7c3aed;
            border-radius: 50%;
            animation: spinnerRotate 1.5s linear infinite reverse;
        }

        @keyframes spinnerRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .status.hidden { display: none; }

        /* ─── Botones mejorados ─── */
        .btn-primary {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            font-family: inherit;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            margin-bottom: 12px;
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease 0.6s both;
        }

        .btn-primary::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transform: translateX(-100%);
            animation: buttonShine 2s infinite;
        }

        @keyframes buttonShine {
            0% { transform: translateX(-100%); }
            10%, 90% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .btn-open {
            background: linear-gradient(135deg, #7c3aed, #6b21a8);
            color: #fff;
            box-shadow: 0 8px 24px rgba(107,33,168,0.4);
        }

        .btn-open:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(107,33,168,0.6);
        }

        .btn-open:active {
            transform: translateY(0);
        }

        /* ─── Botones de tienda ─── */
        .store-buttons {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 8px;
        }

        .store-buttons.visible {
            display: flex;
            animation: storeButtonsAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes storeButtonsAppear {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-store {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 20px;
            border-radius: 14px;
            font-family: inherit;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 1px solid rgba(255,255,255,0.12);
            position: relative;
            overflow: hidden;
        }

        .btn-store::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.1);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
            border-radius: inherit;
        }

        .btn-store:hover::before {
            transform: scaleX(1);
        }

        .btn-apple, .btn-google {
            background: rgba(255,255,255,0.08);
            color: #fff;
            position: relative;
            z-index: 1;
        }

        .btn-store svg {
            width: 22px;
            height: 22px;
            fill: currentColor;
            transition: transform 0.3s ease;
        }

        .btn-store:hover svg {
            transform: scale(1.1);
        }

        /* ─── Divisor mejorado ─── */
        .divider {
            display: none;
            align-items: center;
            gap: 12px;
            margin: 20px 0 16px;
            color: rgba(255,255,255,0.25);
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            animation: fadeInUp 0.6s ease 0.7s both;
        }

        .divider.visible {
            display: flex;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,0.1), rgba(255,255,255,0));
        }

        /* ─── Botón JW.org ─── */
        .btn-jw {
            display: none;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            background: transparent;
            color: rgba(255,255,255,0.45);
            font-family: inherit;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            animation: fadeInUp 0.6s ease 0.8s both;
        }

        .btn-jw.visible {
            display: flex;
        }

        .btn-jw:hover {
            color: rgba(255,255,255,0.8);
            transform: translateY(-1px);
        }

        /* ─── Animación general de fade-in-up ─── */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ─── Animación de pulsación para estado de carga ─── */
        @keyframes pulseGlow {
            0%, 100% { box-shadow: 0 12px 32px rgba(107,33,168,0.4); }
            50% { box-shadow: 0 12px 48px rgba(107,33,168,0.7); }
        }

        .app-icon.loading {
            animation: iconFloat 3.5s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite, pulseGlow 2s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon loading">📖</div>
        <div class="app-name">JW Extras</div>

        <div class="pub-name" id="pubName">Publicación</div>
        <div class="pub-detail" id="pubDetail"></div>

        <div class="status" id="status">
            <div class="spinner"></div>
            <span>Abriendo en la app…</span>
        </div>

        <a href="#" class="btn-primary btn-open" id="btnOpen" style="display:none;" onclick="tryOpen()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V9a2 2 0 012-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
            Abrir en JW Extras
        </a>

        <div class="store-buttons" id="storeButtons">
            <!-- REEMPLAZA ESTOS LINKS CON TUS LINKS REALES -->
            <a href="https://apps.apple.com/us/app/servicio-jw-mi-ministerio/id6770139586" class="btn-store btn-apple" id="btnApple">
                <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.51 2.51-2.48 4.29-2.52 1.28 0 2.49.66 3.28.65.75-.02 1.94-.84 3.32-.73.91.06 1.77.47 2.33 1.16.19.23.37.48.53.75-1.05.64-2.2 1.51-2.27 3.1-.07 1.88 1.34 2.96 2.15 3.5-.29.77-.77 1.51-1.34 2.08z"/><path d="M12 2C12.54 1.34 12.75.36 12.03.04c-.72-.32-1.9.37-2.54 1.16-.46.56-.73 1.18-.66 1.83.67-.1 1.36-.43 1.89-.79.53-.36.96-.92 1.28-1.24z"/></svg>
                App Store
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.ismaelcastroluna.juegosbiblicos&pcampaignid=web_share" class="btn-store btn-google" id="btnGoogle">
                <svg viewBox="0 0 24 24"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302-2.303A1 1 0 0020.89 6.7l-6.928 6.3 6.928 6.3a1 1 0 01-.988 1.696l-2.302-2.303-2.302-2.302L10.89 12l2.816-2.492z" fill="currentColor"/></svg>
                Google Play
            </a>
        </div>

        <div class="divider" id="divider">O</div>

        <a href="#" class="btn-jw" id="btnJw">
            🌐 Ver en jw.org
        </a>
    </div>

    <script>
        // ─── Mapa de códigos de publicación a nombres legibles ───
        const PUB_NAMES = {
            'lff': 'Disfrute de la vida para siempre',
            'lffi': 'Disfrute de la vida para siempre (interactivo)',
            'nwt': 'Traducción del Nuevo Mundo',
            'w': 'La Atalaya',
            'wp': 'La Atalaya (pública)',
            'g': '¡Despertad!',
            'mwb': 'Vida y Ministerio Cristianos',
            'bhs': '¿Qué enseña la Biblia?',
            'bt': 'Imitemos su fe',
            'cl': 'Acerquémonos a Jehová',
            'gt': 'El hombre más grande',
            'ia': 'Imite su fe',
            'jy': 'Jesús: El camino',
            'kr': 'El Reino de Dios',
            'lfb': 'Lecciones de la Biblia',
            'od': 'Organizados',
            'rj': 'Regreso a Jehová',
            'rr': 'Rescate',
            'sjj': 'Cantemos a Jehová',
            'th': 'Escuela del ministerio',
            'yb': 'Anuario',
        };

        // ─── Leer parámetros de la URL ───
        const params = new URLSearchParams(window.location.search);
        const pubCode = params.get('pub') || '';
        const capitulo = params.get('capitulo') || '';
        const parrafo = params.get('parrafo') || '';
        const nombre = params.get('nombre') || '';

        // ─── Mostrar nombre de la publicación ───
        const displayName = nombre || PUB_NAMES[pubCode.toLowerCase()] || pubCode;
        document.getElementById('pubName').textContent = displayName;

        let detailParts = [];
        if (capitulo) detailParts.push(`Capítulo ${capitulo}`);
        if (parrafo) detailParts.push(`Párrafo ${parrafo}`);
        document.getElementById('pubDetail').textContent = detailParts.join(' · ') || 'Abrir publicación';

        // ─── Construir deep link ───
        function buildDeepLink() {
            let url = `serviciojw://publicacion?pub=${encodeURIComponent(pubCode)}`;
            if (capitulo) url += `&capitulo=${encodeURIComponent(capitulo)}`;
            if (parrafo) url += `&parrafo=${encodeURIComponent(parrafo)}`;
            return url;
        }

        // ─── JW.org link ───
        function buildJwLink() {
            if (pubCode) {
                return `https://www.jw.org/finder?srcid=jwlshare&wtlocale=S&prefer=lang&pub=${pubCode}`;
            }
            return 'https://www.jw.org/es/';
        }
        document.getElementById('btnJw').href = buildJwLink();

        // ─── Intentar abrir la app automáticamente ───
        let appOpened = false;

        function tryOpen() {
            const deepLink = buildDeepLink();
            window.location.href = deepLink;

            // Si después de 2s no se abrió, mostrar fallback
            setTimeout(showFallback, 2000);
        }

        function showFallback() {
            if (appOpened) return;
            document.getElementById('status').style.display = 'none';
            document.getElementById('btnOpen').style.display = 'flex';
            document.getElementById('storeButtons').classList.add('visible');
            document.getElementById('divider').classList.add('visible');
            document.getElementById('btnJw').classList.add('visible');
            document.querySelector('.app-icon').classList.remove('loading');
        }

        // Detectar si la app se abrió (la página se oculta)
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) appOpened = true;
        });

        window.addEventListener('blur', function() {
            appOpened = true;
        });

        // Auto-intentar abrir la app al cargar
        if (pubCode) {
            tryOpen();
        } else {
            showFallback();
        }
    </script>
</body>
</html>
