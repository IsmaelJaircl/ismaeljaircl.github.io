<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JW Extras — Página no encontrada</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0f2e 25%, #0d1b2a 75%, #0a0a1a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
            position: relative;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.2;
            background: radial-gradient(circle, #7c3aed, transparent);
            top: -100px;
            left: -100px;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            background: radial-gradient(circle, #0ea5e9, transparent);
            bottom: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            25% { transform: translate(30px, -30px); }
            50% { transform: translate(0, -60px); }
            75% { transform: translate(-30px, -30px); }
        }

        /* Grid background pattern */
        .grid-bg {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-image:
                linear-gradient(rgba(124, 58, 237, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(124, 58, 237, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            z-index: 0;
            pointer-events: none;
        }

        /* Container */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
            max-width: 500px;
            width: 100%;
        }

        /* Floating 404 number */
        .number-404 {
            position: relative;
            font-size: clamp(80px, 20vw, 140px);
            font-weight: 900;
            background: linear-gradient(135deg, #7c3aed 0%, #0ea5e9 50%, #6366f1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(124, 58, 237, 0.3);
            animation: pulse-number 3s ease-in-out infinite;
            letter-spacing: -2px;
        }

        @keyframes pulse-number {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        /* Main card */
        .card {
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 48px 32px;
            width: 100%;
            text-align: center;
            box-shadow: 
                0 20px 60px rgba(0, 0, 0, 0.5),
                inset 0 1px 0 rgba(255, 255, 255, 0.1);
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(124, 58, 237, 0.5), transparent);
            z-index: 0;
        }

        .card-content {
            position: relative;
            z-index: 1;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Animated icon */
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            display: inline-block;
            animation: float-icon 2s ease-in-out infinite;
        }

        @keyframes float-icon {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        /* Heading */
        h1 {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, rgba(255, 255, 255, 0.8) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        /* Subtitle */
        .subtitle {
            font-size: 13px;
            color: rgba(124, 58, 237, 0.8);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 16px;
            animation: fadeIn 1s ease-in-out 0.2s forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* Description */
        p {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.6);
            line-height: 1.7;
            margin-bottom: 32px;
            font-weight: 400;
        }

        /* Button container */
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            animation: fadeIn 1.2s ease-in-out 0.4s forwards;
            opacity: 0;
        }

        /* Primary button */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #7c3aed 0%, #6b21a8 100%);
            color: #fff;
            font-family: inherit;
            font-size: 15px;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 12px 30px rgba(107, 33, 168, 0.4);
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(107, 33, 168, 0.6);
        }

        .btn:active {
            transform: translateY(-2px);
        }

        .btn span {
            position: relative;
            z-index: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Secondary button */
        .btn-secondary {
            background: rgba(124, 58, 237, 0.1);
            border: 1px solid rgba(124, 58, 237, 0.3);
            color: #a78bfa;
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(124, 58, 237, 0.2);
            border-color: rgba(124, 58, 237, 0.5);
            box-shadow: 0 12px 30px rgba(124, 58, 237, 0.2);
        }

        /* Icon styles */
        .icon-arrow {
            font-size: 18px;
            transition: transform 0.3s ease;
        }

        .btn:hover .icon-arrow {
            transform: translateX(-4px);
        }

        /* Responsive */
        @media (max-width: 480px) {
            .card {
                padding: 40px 24px;
            }

            h1 {
                font-size: 24px;
            }

            p {
                font-size: 14px;
            }

            .btn {
                padding: 14px 24px;
                font-size: 14px;
            }
        }

        /* Mouse follower */
        .cursor-glow {
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.1), transparent);
            filter: blur(40px);
            pointer-events: none;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>
    <div class="cursor-glow"></div>
    
    <div class="container">
        <div class="number-404">404</div>
        
        <div class="card">
            <div class="card-content">
                <div class="subtitle">Página no encontrada</div>
                <div class="icon">🔍</div>
                <h1>¡Oops! Se perdió el camino</h1>
                <p>Este enlace no es válido o ha expirado. No te preocupes, puedes volver al inicio y explorar todas las funciones de JW Extras.</p>
                
                <div class="button-group">
                    <a href="/" class="btn">
                        <span>
                            <span class="icon-arrow">←</span>
                            Volver al inicio
                        </span>
                    </a>
                    <button class="btn btn-secondary" onclick="goBack()">
                        <span>
                            <span class="icon-arrow">⤴</span>
                            Atrás
                        </span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Cursor glow effect
        const cursorGlow = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursorGlow.style.left = (e.clientX - 50) + 'px';
            cursorGlow.style.top = (e.clientY - 50) + 'px';
            cursorGlow.style.opacity = '1';
        });

        document.addEventListener('mouseleave', () => {
            cursorGlow.style.opacity = '0';
        });

        // Go back button
        function goBack() {
            window.history.back();
        }

        // Smooth scroll to top on page load
        window.addEventListener('load', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // Ripple effect on card hover
        const card = document.querySelector('.card');
        card.addEventListener('mouseenter', function() {
            this.style.borderColor = 'rgba(124, 58, 237, 0.3)';
        });
        card.addEventListener('mouseleave', function() {
            this.style.borderColor = 'rgba(255, 255, 255, 0.1)';
        });
    </script>
</body>
</html>
