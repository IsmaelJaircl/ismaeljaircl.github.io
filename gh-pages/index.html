<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JW Extras</title>
    <meta name="description" content="Tu compañero de estudio y servicio. Descarga JW Extras para iOS y Android.">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: linear-gradient(160deg, #0a0a1a 0%, #1a1035 40%, #0d1b2a 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        body::before, body::after {
            content: ''; position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.25; animation: float 8s ease-in-out infinite; z-index: 0;
        }
        body::before { width: 300px; height: 300px; background: radial-gradient(circle, #7c3aed, transparent); top: -100px; right: -80px; }
        body::after { width: 250px; height: 250px; background: radial-gradient(circle, #2563eb, transparent); bottom: -80px; left: -60px; animation-delay: -4s; }
        @keyframes float { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-30px) scale(1.1); } }

        .card {
            position: relative; z-index: 1;
            background: rgba(255,255,255,0.06);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            padding: 48px 32px 40px;
            max-width: 400px; width: 100%;
            text-align: center;
            box-shadow: 0 32px 64px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.08);
            animation: cardIn 0.7s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes cardIn { from { opacity: 0; transform: translateY(40px) scale(0.95); } to { opacity: 1; transform: translateY(0) scale(1); } }

        .app-icon {
            width: 100px; height: 100px;
            border-radius: 24px;
            margin: 0 auto 24px;
            background: linear-gradient(135deg, #6b21a8, #4c1d95, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 16px 40px rgba(107,33,168,0.45);
            font-size: 48px;
            animation: iconPulse 3s ease-in-out infinite;
        }
        @keyframes iconPulse { 0%, 100% { box-shadow: 0 16px 40px rgba(107,33,168,0.4); } 50% { box-shadow: 0 16px 56px rgba(107,33,168,0.6); } }

        h1 {
            font-size: 32px; font-weight: 900; letter-spacing: -0.5px; margin-bottom: 8px;
            background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .subtitle {
            font-size: 15px; color: rgba(255,255,255,0.5); font-weight: 500; margin-bottom: 32px; line-height: 1.5;
        }

        .features {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; text-align: left;
        }
        .feature {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            padding: 14px 12px;
        }
        .feature-icon { font-size: 22px; margin-bottom: 6px; }
        .feature-text { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.65); line-height: 1.3; }

        .store-buttons { display: flex; flex-direction: column; gap: 10px; }
        .btn-store {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            padding: 15px 20px; border-radius: 14px;
            font-family: inherit; font-size: 15px; font-weight: 700;
            cursor: pointer; text-decoration: none;
            transition: all 0.2s ease;
            border: none;
        }
        .btn-apple {
            background: #fff; color: #000;
        }
        .btn-apple:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(255,255,255,0.15); }
        .btn-google {
            background: rgba(255,255,255,0.1); color: #fff;
            border: 1px solid rgba(255,255,255,0.15);
        }
        .btn-google:hover { background: rgba(255,255,255,0.16); }
        .btn-store svg { width: 22px; height: 22px; fill: currentColor; }
    </style>
</head>
<body>
    <div class="card">
        <div class="app-icon">✨</div>
        <h1>JW Extras</h1>
        <p class="subtitle">Tu compañero de estudio y servicio cristiano</p>

        <div class="features">
            <div class="feature">
                <div class="feature-icon">📖</div>
                <div class="feature-text">Biblia con subrayados y notas</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📚</div>
                <div class="feature-text">Publicaciones offline</div>
            </div>
            <div class="feature">
                <div class="feature-icon">🎮</div>
                <div class="feature-text">Juegos bíblicos</div>
            </div>
            <div class="feature">
                <div class="feature-icon">📊</div>
                <div class="feature-text">Registro de servicio</div>
            </div>
        </div>

        <div class="store-buttons">
            <a href="https://apps.apple.com/us/app/servicio-jw-mi-ministerio/id6770139586" class="btn-store btn-apple">
                <svg viewBox="0 0 24 24"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11"/></svg>
                Descargar en App Store
            </a>
            <a href="https://play.google.com/store/apps/details?id=com.ismaelcastroluna.juegosbiblicos&pcampaignid=web_share" class="btn-store btn-google">
                <svg viewBox="0 0 24 24"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 01-.61-.92V2.734a1 1 0 01.609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-3.199l2.302 2.302c.7.7.7 1.68 0 2.38l-2.302 2.302L15.396 12l2.302-2.492zM5.864 3.471l10.937 6.333-2.302 2.302-8.635-8.635z"/></svg>
                Descargar en Google Play
            </a>
        </div>
    </div>
</body>
</html>
